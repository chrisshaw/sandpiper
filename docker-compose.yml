services:
  redis:
    image: redis:7-alpine
    container_name: sandpiper-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mongodb:
    image: mongo:${MONGO_VERSION:-8.0}
    container_name: sandpiper-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb-keyfile:/data/keyfile-src:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: sandpiper
      MONGO_INITDB_ROOT_PASSWORD: sandpiper123
    entrypoint: >
      bash -c '
        cp /data/keyfile-src /data/keyfile &&
        chmod 400 /data/keyfile &&
        chown mongodb:mongodb /data/keyfile &&
        exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --keyFile /data/keyfile
      '
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "-u",
          "sandpiper",
          "-p",
          "sandpiper123",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.runCommand('ping').ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongodb-init:
    image: mongo:${MONGO_VERSION:-8.0}
    container_name: sandpiper-mongodb-init
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: >
      mongosh --host sandpiper-mongodb -u sandpiper -p sandpiper123 --authenticationDatabase admin --eval '
        try { rs.status() }
        catch(e) { rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "localhost:27017" }] }) }
      '
    restart: "no"

  ministack:
    image: nahuelnucera/ministack:1.1.51
    container_name: ministack-main
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      PERSIST_STATE: 1
      STATE_DIR: /data/ministack-state
    volumes:
      - "ministack_data:/data"
      - "/var/run/docker.sock:/var/run/docker.sock"
    restart: unless-stopped

  ministack-init:
    image: amazon/aws-cli:latest
    container_name: ministack-init
    depends_on:
      ministack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: /bin/sh
    command:
      - -c
      - |
        aws s3api create-bucket --endpoint-url http://ministack-main:4566 --bucket nto-sandpiper-local --region us-east-1
        aws s3api put-bucket-cors --endpoint-url http://ministack-main:4566 --bucket nto-sandpiper-local --cors-configuration '{
          "CORSRules": [
            {
              "AllowedOrigins": ["http://localhost:5173"],
              "AllowedMethods": ["GET", "HEAD"],
              "AllowedHeaders": ["*"],
              "MaxAgeSeconds": 3600
            }
          ]
        }'
    restart: "no"

volumes:
  redis_data:
    driver: local
  mongodb_data:
    driver: local
  ministack_data:
    driver: local
